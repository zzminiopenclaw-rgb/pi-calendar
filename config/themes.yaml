# Color themes for Pi Calendar
# Change 'active_theme' to switch schemes

active_theme: "synthwave"

schemes:
  synthwave:
    name: "Synthwave Neon"
    description: "Cyberpunk vibes with neon cyan and magenta"
    colors:
      background: "#0a0a0f"
      foreground: "#e0e0e0"
      primary: "#00f0ff"      # Neon cyan
      secondary: "#ff00ff"    # Hot magenta
      accent: "#ffaa00"       # Amber
      success: "#00ff88"      # Matrix green
      warning: "#ffdd00"      # Yellow
      error: "#ff0044"        # Red
      muted: "#404050"        # Dim gray
      border: "#00f0ff"       # Cyan borders
      today_bg: "#ff00ff"     # Today highlight
      today_fg: "#ffffff"
      header_bg: "#1a0a2e"    # Deep purple
      header_fg: "#00f0ff"
      sidebar_bg: "#0f0a1a"
      sidebar_fg: "#e0e0e0"
      calendar_bg: "#0a0a0f"
      calendar_fg: "#e0e0e0"
      grid_lines: "#1a1a2e"   # Subtle grid
    calendar_colors:
      - "#00f0ff"  # Personal - cyan
      - "#ff00ff"  # Work - magenta
      - "#ffaa00"  # Other - amber
      - "#00ff88"  # Extra - green
    style:
      border_type: "solid"      # solid, double, rounded
      border_width: 1
      header_art: "synthwave"
      show_grid: true
      grid_style: "dots"        # dots, lines, none
      today_shape: "◆"          # ◆ ■ ● ▲
      event_indicator: "█"    # █ ▓ ▒ ░ ·
      font_style: "bold"
      glow_effect: true

  minimal:
    name: "Minimal Light"
    description: "Clean, distraction-free light theme"
    colors:
      background: "#f5f5f5"
      foreground: "#333333"
      primary: "#2563eb"      # Blue
      secondary: "#7c3aed"    # Purple
      accent: "#ea580c"       # Orange
      success: "#16a34a"
      warning: "#ca8a04"
      error: "#dc2626"
      muted: "#9ca3af"
      border: "#d1d5db"
      today_bg: "#dbeafe"
      today_fg: "#1e40af"
      header_bg: "#ffffff"
      header_fg: "#1f2937"
      sidebar_bg: "#fafafa"
      sidebar_fg: "#374151"
      calendar_bg: "#ffffff"
      calendar_fg: "#111827"
      grid_lines: "#e5e7eb"
    calendar_colors:
      - "#2563eb"
      - "#7c3aed"
      - "#ea580c"
      - "#16a34a"
    style:
      border_type: "solid"
      border_width: 1
      header_art: "simple"
      show_grid: true
      grid_style: "lines"
      today_shape: "●"
      event_indicator: "·"
      font_style: "normal"
      glow_effect: false

  amber:
    name: "Amber Terminal"
    description: "Retro amber phosphor CRT aesthetic"
    colors:
      background: "#1a0f00"
      foreground: "#ffb000"
      primary: "#ffb000"      # Amber
      secondary: "#ff8000"    # Dark orange
      accent: "#ffcc00"       # Light amber
      success: "#88ff00"
      warning: "#ffaa00"
      error: "#ff4400"
      muted: "#664400"
      border: "#cc8800"
      today_bg: "#ff8800"
      today_fg: "#1a0f00"
      header_bg: "#2a1a00"
      header_fg: "#ffb000"
      sidebar_bg: "#1f1200"
      sidebar_fg: "#ffb000"
      calendar_bg: "#1a0f00"
      calendar_fg: "#ffb000"
      grid_lines: "#332200"
    calendar_colors:
      - "#ffb000"
      - "#ff8800"
      - "#ffcc00"
      - "#ff6600"
    style:
      border_type: "double"
      border_width: 1
      header_art: "retro"
      show_grid: true
      grid_style: "lines"
      today_shape: "▮"
      event_indicator: "▓"
      font_style: "bold"
      glow_effect: true
      scanlines: true

  midnight:
    name: "Midnight Ocean"
    description: "Deep blue calming palette"
    colors:
      background: "#0c1220"
      foreground: "#a5b4fc"
      primary: "#60a5fa"      # Sky blue
      secondary: "#a78bfa"    # Lavender
      accent: "#34d399"       # Sea green
      success: "#4ade80"
      warning: "#fbbf24"
      error: "#f87171"
      muted: "#475569"
      border: "#3b82f6"
      today_bg: "#2563eb"
      today_fg: "#ffffff"
      header_bg: "#1e293b"
      header_fg: "#60a5fa"
      sidebar_bg: "#0f172a"
      sidebar_fg: "#cbd5e1"
      calendar_bg: "#0c1220"
      calendar_fg: "#e2e8f0"
      grid_lines: "#1e293b"
    calendar_colors:
      - "#60a5fa"
      - "#a78bfa"
      - "#34d399"
      - "#fbbf24"
    style:
      border_type: "rounded"
      border_width: 1
      header_art: "ocean"
      show_grid: true
      grid_style: "dots"
      today_shape: "●"
      event_indicator: "◐"
      font_style: "normal"
      glow_effect: false

  matrix:
    name: "Matrix Code"
    description: "Green on black hacker aesthetic"
    colors:
      background: "#000000"
      foreground: "#00ff00"
      primary: "#00ff00"      # Bright green
      secondary: "#00cc00"    # Dim green
      accent: "#88ff00"       # Yellow-green
      success: "#00ff88"
      warning: "#ffff00"
      error: "#ff0000"
      muted: "#003300"
      border: "#00aa00"
      today_bg: "#004400"
      today_fg: "#00ff00"
      header_bg: "#001100"
      header_fg: "#00ff00"
      sidebar_bg: "#000a00"
      sidebar_fg: "#00dd00"
      calendar_bg: "#000000"
      calendar_fg: "#00ff00"
      grid_lines: "#002200"
    calendar_colors:
      - "#00ff00"
      - "#00cc00"
      - "#88ff00"
      - "#44ff00"
    style:
      border_type: "solid"
      border_width: 1
      header_art: "matrix"
      show_grid: false
      grid_style: "none"
      today_shape: "■"
      event_indicator: "░"
      font_style: "bold"
      glow_effect: true
      rain_effect: true
